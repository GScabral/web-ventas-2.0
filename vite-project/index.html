<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tiendalog.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título/descripción de respaldo: se ven en la pestaña del navegador
         un instante antes de que cargue React, y son los que leen los
         crawlers de SEO y las previsualizaciones de links (WhatsApp,
         redes) que no ejecutan JavaScript. Una vez que carga la app,
         ThemeLoader.jsx pisa el <title> con el nombre real configurado
         en Personalización (ver componentes/ThemeLoader.jsx). Al
         reutilizar este sitio para otro cliente, actualizar estos dos
         valores junto con config/storeConfig.js. -->
    <title>Tienda Demo | Ropa y accesorios online</title>
    <meta name="description" content="Tienda Demo — moda accesible para todos los días. Comprá ropa y accesorios online con envíos y pago por Mercado Pago." />

    <!-- Open Graph/Twitter de respaldo, iguales por ahora en TODAS las
         páginas: los bots que arman la vista previa de un link (WhatsApp,
         Facebook, Twitter) no ejecutan JavaScript, así que sólo van a ver
         estas etiquetas estáticas sin importar qué página se comparta.
         useMetaTags.js (ver src/componentes/hooks) sí pisa el <title> y
         estas mismas etiquetas por página, pero eso corre en el
         navegador — sirve para la pestaña y para crawlers que sí
         ejecutan JS (como Googlebot), no para esos bots de preview. -->
    <meta property="og:site_name" content="Tienda Demo" />
    <meta property="og:title" content="Tienda Demo | Ropa y accesorios online" />
    <meta property="og:description" content="Tienda Demo — moda accesible para todos los días. Comprá ropa y accesorios online con envíos y pago por Mercado Pago." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
